# fly.toml app configuration file generated for mobfleet-stream-relay on 2026-06-28T16:16:23+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mobfleet-stream-relay'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALLOW_ORIGIN = 'https://mobfleet.co'
  PORT = '8090'

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
