# fly.io deploy config for the MobFleet MJPEG stream relay.
#
# Secrets are NOT committed — set them once:
#   fly secrets set SUPABASE_URL=https://<ref>.supabase.co SUPABASE_ANON_KEY=<anon-key>
#
# fly terminates TLS and proxies BOTH the HTTP multipart /stream and the WS /publish upgrade over
# internal_port with force_https, so browsers get https:// + wss:// (required — mobfleet.co is HTTPS).
app = "mobfleet-stream-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8090"
  ALLOW_ORIGIN = "https://mobfleet.co"

[http_service]
  internal_port = 8090
  force_https = true
  # Keep a machine running — MJPEG viewers + the agent publisher hold long-lived connections.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
